{% extends "quiz/base.html" %}
{% load static %}
<script src="{% static 'assets/logic.js' %}"></script>
{% block cat %}



{% for title in titles %}

   <div style="width:2400px; display: flex;

  align-items: center;
  height: 100px;
  width: 100%;height:300px;border: solid 1px grey; border-radius:20px;margin-bottom:50px;box-shadow: 0px 3px 18px 3px rgba(0, 0, 0, 0.7);">
        <a href="{{title.title}}/" class="neonText"><h3>{{title.title.upper}}</h3></a>
         {% if title.is_Video %}
        <img src="{%static 'assets/Video.png'%}" style="width:100px;height:100px;margin-left:200px;">
    {% endif %}
    {% if title.is_Audio %}
        <img src="{%static 'assets/Audio.png'%}" style="width:100px;height:100px;margin-left:200px;">
    {% endif %}
    {% if title.is_Image %}
        <img src="{%static 'assets/Picture.png'%}" style="width:100px;height:100px;margin-left:200px;">
    {% endif %}
   </div>

{%endfor%}









</div>
{% endblock %}
