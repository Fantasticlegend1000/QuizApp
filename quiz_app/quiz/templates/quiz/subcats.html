{% extends "quiz/base.html" %}
{% load static %}
{% block catw %}


<h3 style="margin: auto;margin-top:70px;margin-bottom:50px;width:580px;font-size:50px;font-weight:800;background: -webkit-linear-gradient(318deg, rgba(251,91,18,1) 4%, rgba(157,0,255,0.8) 97%);
  -webkit-background-clip: text;

  -webkit-text-fill-color: transparent;">Choose your sub category</h3>
<div style="width:1800px;height:1200px;border: solid 1px grey; border-radius:20px;margin: auto;box-shadow: 0px 3px 18px 3px rgba(0, 0, 0, 0.7);">

<a href="questions/{{maincat}}" i><div class="maincat" id="All">
        <img src="{%static 'assets/All.png'%}">
    <h3>ALL</h3></div></a>
{% for item in subcats%}
    <a href="questions/{{item}}" i><div class="maincat" id="{{item}}">
        <img src="{%static 'assets/'%}{{item}}.png">
        <h3>{{item.upper}}</h3>





    </div></a>

{% endfor %}














</div>
{% endblock %}
